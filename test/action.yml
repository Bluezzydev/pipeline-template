name: welcome user
description: This workflow will welcome the user when they push to the main branch.
inputs:
  user_name:
    description: 'The name of the user to welcome'
    required: true
    default: 'world'
  age:
    description: 'The age of the user'
    required: false
    default: 'unknown'
outputs:
  welcome_message:
    description: 'The welcome message for the user'
    value: ${{ steps.welcome.outputs.message }}
runs:
  using: "composite"
  steps:
    - name: Welcome the user
      id: welcome
      shell: bash
      run: echo "Hello ${{ inputs.user_name }}! You are ${{ inputs.age }} years old. Welcome to the GitHub Actions learning journey."
